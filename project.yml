name: Bank
options:
  bundleIdPrefix: com.bank
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  Bank:
    type: application
    platform: iOS
    sources:
      - Bank
    entitlements:
      path: Bank/Bank.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.anushriadhia.bank
    info:
      path: Bank/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anushriadhia.bank
        INFOPLIST_KEY_NSFamilyControlsUsageDescription: "Bank needs Screen Time access to block apps during focus sessions and unblock them when you spend your balance."
    dependencies:
      - target: ShieldConfigurationExtension
      - target: DeviceActivityMonitorExtension

  ShieldConfigurationExtension:
    type: app-extension
    platform: iOS
    sources:
      - ShieldConfigurationExtension
    entitlements:
      path: ShieldConfigurationExtension/ShieldConfigurationExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.anushriadhia.bank
    info:
      path: ShieldConfigurationExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-configuration
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldConfigurationExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anushriadhia.bank.ShieldConfiguration

  DeviceActivityMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - DeviceActivityMonitorExtension
    entitlements:
      path: DeviceActivityMonitorExtension/DeviceActivityMonitorExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.anushriadhia.bank
    info:
      path: DeviceActivityMonitorExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivity.monitor
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).DeviceActivityMonitorExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anushriadhia.bank.DeviceActivityMonitor
