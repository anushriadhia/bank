name: Bank
options:
  bundleIdPrefix: com.bank
  deploymentTarget:
    iOS: "16.2"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

schemes:
  Bank:
    build:
      targets:
        Bank: all
        ShieldConfigurationExtension: all
        DeviceActivityMonitorExtension: all
        BankWidgetExtension: all
        BankTests: [testing]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BankTests
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  Bank:
    type: application
    platform: iOS
    sources:
      - Bank
      - Shared
    entitlements:
      path: Bank/Bank.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.anushriadhia.bank
    info:
      path: Bank/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anushriadhia.bank
        INFOPLIST_KEY_NSFamilyControlsUsageDescription: "Bank needs Screen Time access to block apps during focus sessions and unblock them when you spend your balance."
    dependencies:
      - target: ShieldConfigurationExtension
      - target: DeviceActivityMonitorExtension
      - target: BankWidgetExtension

  BankTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BankTests
    dependencies:
      - target: Bank
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anushriadhia.bank.tests
        GENERATE_INFOPLIST_FILE: YES

  ShieldConfigurationExtension:
    type: app-extension
    platform: iOS
    sources:
      - ShieldConfigurationExtension
    entitlements:
      path: ShieldConfigurationExtension/ShieldConfigurationExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.anushriadhia.bank
    info:
      path: ShieldConfigurationExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-configuration
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldConfigurationExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anushriadhia.bank.ShieldConfiguration

  DeviceActivityMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - DeviceActivityMonitorExtension
    entitlements:
      path: DeviceActivityMonitorExtension/DeviceActivityMonitorExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.anushriadhia.bank
    info:
      path: DeviceActivityMonitorExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivity.monitor
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).DeviceActivityMonitorExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anushriadhia.bank.DeviceActivityMonitor

  BankWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - BankWidgetExtension
      - Shared
    info:
      path: BankWidgetExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anushriadhia.bank.BankWidget
